<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Ecosystem — Agent Workspace 2D</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #111827;
            --floor: #1e293b;
            --floor-alt: #1a2235;
            --wall: #334155;
            --wall-top: #475569;
            --desk: #78350f;
            --desk-top: #92400e;
            --screen-glow: #22d3ee;
            --purple: #8b5cf6;
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
            --cyan: #22d3ee;
            --text: #e2e8f0;
            --text-dim: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        /* ═══ LAYOUT ═══ */
        .app {
            display: grid;
            grid-template-rows: 48px 1fr 180px;
            height: 100vh;
        }

        /* ═══ TOP BAR ═══ */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            background: linear-gradient(135deg, #8b5cf6, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .system-badge {
            font-size: 0.7em;
            padding: 3px 10px;
            border-radius: 10px;
            background: rgba(52, 211, 153, 0.15);
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .system-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75em;
            color: var(--text-dim);
        }

        .metric-val {
            color: var(--cyan);
            font-weight: 600;
        }

        /* ═══ GAME CANVAS ═══ */
        .game-wrapper {
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }

        canvas#gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* Tooltip that follows agents */
        .agent-tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.75em;
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
            max-width: 220px;
        }

        .agent-tooltip.visible {
            opacity: 1;
        }

        .agent-tooltip .tt-name {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.7em;
            margin-bottom: 4px;
        }

        .agent-tooltip .tt-task {
            color: var(--text-dim);
            font-size: 0.85em;
        }

        /* ═══ BOTTOM PANEL ═══ */
        .bottom-panel {
            display: grid;
            grid-template-columns: 320px 1fr 1fr;
            background: rgba(15, 23, 42, 0.95);
            border-top: 1px solid rgba(139, 92, 246, 0.15);
        }

        .panel-section {
            padding: 12px 16px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
        }

        .panel-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55em;
            color: var(--purple);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Agent cards in panel */
        .agent-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .agent-mini:hover {
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(139, 92, 246, 0.05);
        }

        .agent-manager-btn {
            cursor: pointer;
            font-size: 1.2em;
            opacity: 0.5;
            transition: opacity 0.2s;
            margin-left: auto;
        }

        .agent-manager-btn:hover {
            opacity: 1;
        }

        .agent-manager-btn.active {
            opacity: 1;
            filter: drop-shadow(0 0 4px #fbbf24);
        }

        .agent-mini-avatar {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
        }

        .agent-mini-info {
            flex: 1;
        }

        .agent-mini-name {
            font-size: 0.78em;
            font-weight: 700;
        }

        .agent-mini-status {
            font-size: 0.65em;
            color: var(--text-dim);
            margin-top: 1px;
        }

        .mini-badge {
            font-size: 0.6em;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .mini-badge.working {
            background: rgba(52, 211, 153, 0.15);
            color: var(--green);
        }

        .mini-badge.thinking {
            background: rgba(251, 191, 36, 0.15);
            color: var(--yellow);
        }

        .mini-badge.sleeping {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-dim);
        }

        .mini-badge.walking {
            background: rgba(34, 211, 238, 0.15);
            color: var(--cyan);
        }

        /* Command input */
        .cmd-wrap {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .cmd-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 7px 10px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78em;
            outline: none;
        }

        .cmd-input:focus {
            border-color: var(--purple);
        }

        .cmd-btn {
            background: var(--purple);
            border: none;
            color: white;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 0.78em;
            cursor: pointer;
            font-weight: 600;
        }

        .cmd-btn:hover {
            filter: brightness(1.2);
        }

        /* Log entries */
        .log-entry {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7em;
            padding: 4px 8px;
            margin-bottom: 3px;
            border-radius: 4px;
            display: flex;
            gap: 8px;
        }

        .log-t {
            color: var(--text-dim);
            white-space: nowrap;
        }

        .log-a {
            font-weight: 600;
            white-space: nowrap;
        }

        .log-a.analyst {
            color: var(--cyan);
        }

        .log-a.planner {
            color: var(--purple);
        }

        .log-a.searcher {
            color: var(--green);
        }

        .log-m {
            color: #94a3b8;
        }

        .thought-bubble {
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5em;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 2px;
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- TOP BAR -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="logo">🎮 AI WORKSPACE</span>
                <div class="system-badge"><span class="dot"></span> Online</div>
            </div>
            <div class="topbar-right">
                <button id="switchBtn1" onclick="goToRoom(1)"
                    style="background:var(--purple); color:white; border:none; padding:4px 10px; border-radius:4px; font-family:'Press Start 2P', monospace; font-size:0.5em; cursor:pointer; margin-right:10px; box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);">SERVER
                    ROOM</button>
                <button id="switchBtn2" onclick="goToRoom(2)"
                    style="background:var(--cyan); color:white; border:none; padding:4px 10px; border-radius:4px; font-family:'Press Start 2P', monospace; font-size:0.5em; cursor:pointer; margin-right:15px; box-shadow: 0 0 10px rgba(34, 211, 238, 0.3);">SPACE
                    DOME</button>
                <span>Agents: <span class="metric-val" id="agentCount">16</span></span>
                <span>Tasks: <span class="metric-val" id="taskCount">0</span></span>
                <span id="clock">--:--:--</span>
            </div>
        </header>

        <!-- GAME AREA -->
        <div class="game-wrapper" id="gameWrapper">
            <canvas id="gameCanvas"></canvas>
            <div class="agent-tooltip" id="tooltip"></div>
        </div>

        <!-- BOTTOM PANEL -->
        <div class="bottom-panel">
            <!-- Agents list -->
            <div class="panel-section">
                <div class="panel-title">👥 agents</div>
                <div id="agentList"></div>
            </div>

            <!-- Command center -->
            <div class="panel-section">
                <div class="panel-title">⌨️ command</div>
                <div class="cmd-wrap">
                    <input class="cmd-input" id="cmdInput" placeholder="Send tasks to agents..." />
                    <button class="cmd-btn" onclick="sendCommand()">▶</button>
                </div>
                <div id="cmdLog" style="font-family:'JetBrains Mono',monospace;font-size:0.72em;color:var(--text-dim);">
                </div>
            </div>

        <!-- Activity Logs -->
            <div class="panel-section">
                <div class="panel-title">📜 activity</div>
                <div id="logList"></div>
            </div>
        </div>

        <!-- Control Panel UI Overlay -->
        <div id="controlPanelUI" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 380px; background: rgba(15, 23, 42, 0.98); border: 2px solid #8b5cf6; border-radius: 12px; padding: 24px; z-index: 1000; box-shadow: 0 0 50px rgba(0,0,0,0.9), 0 0 20px rgba(139, 92, 246, 0.2); backdrop-filter: blur(12px); font-family: 'Inter', sans-serif;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px;">
                <h2 style="font-family: 'Press Start 2P', monospace; font-size: 0.85em; color: #8b5cf6; letter-spacing: 1px;">SYSTEM CORE</h2>
                <button onclick="closeUI()" style="background: none; border: none; color: #64748b; cursor: pointer; font-size: 1.8em; line-height: 1;">&times;</button>
            </div>
            
            <div style="background: rgba(0,0,0,0.4); padding: 18px; border-radius: 10px; border: 1px solid rgba(139, 92, 246, 0.1); margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center;">
                    <span style="font-size: 0.75em; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Pulsar Stability</span>
                    <span id="uiStability" style="font-family: 'JetBrains Mono', monospace; color: #22d3ee; font-weight: 700; font-size: 1.1em;">100%</span>
                </div>
                <div style="height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                    <div id="uiStabilityBar" style="height: 100%; background: linear-gradient(90deg, #8b5cf6, #22d3ee); width: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);"></div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 24px;">
                <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(139, 92, 246, 0.15); padding: 14px; border-radius: 10px; text-align: center;">
                    <div style="font-size: 0.65em; color: #64748b; margin-bottom: 8px; font-weight: 700; text-transform: uppercase;">Node State</div>
                    <div id="reactorStatus" style="font-size: 0.8em; color: #34d399; font-weight: 700; font-family: 'JetBrains Mono', monospace;">ACTIVE</div>
                </div>
                <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(139, 92, 246, 0.15); padding: 14px; border-radius: 10px; text-align: center;">
                    <div style="font-size: 0.65em; color: #64748b; margin-bottom: 8px; font-weight: 700; text-transform: uppercase;">Sync Rate</div>
                    <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8em; color: #8b5cf6; font-weight: 700;">8.4 MHz</div>
                </div>
            </div>
            
            <button onclick="addLog('system_0', 'Manual override attempted... access denied.')" style="width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(139, 92, 246, 0.3); color: #8b5cf6; border-radius: 8px; font-family: 'Press Start 2P', monospace; font-size: 0.5em; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                INITIATE STABILITY SYNC
            </button>
            <button onclick="triggerExplosion(); closeUI();" style="margin-top: 12px; width: 100%; padding: 14px; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); color: #ef4444; border-radius: 8px; font-family: 'Press Start 2P', monospace; font-size: 0.5em; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.1);">
                EMERGENCY CORE OVERLOAD
            </button>
        </div>
    </div>

    <script>
        // ============================================
        // GAME ENGINE
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let W, H, SCALE;
        const TILE = 32;
        const grassTexture = new Image();
        grassTexture.src = 'alien_grass_texture.png';
        const pulsarImg = new Image();
        pulsarImg.src = 'cellular_pulsar.png';

        function resize() {
            const wrapper = document.getElementById('gameWrapper');
            W = wrapper.clientWidth;
            H = wrapper.clientHeight;
            canvas.width = W;
            canvas.height = H;
            SCALE = 1;
        }
        window.addEventListener('resize', resize);
        resize();

        // ═══ COLOR PALETTE ═══
        const C = {
            floor: '#1e293b',
            floorAlt: '#1a2235',
            wall: '#334155',
            wallTop: '#475569',
            wallAccent: '#8b5cf6',
            desk: '#78350f',
            deskTop: '#92400e',
            screen: '#0f172a',
            screenGlow: '#22d3ee',
            chair: '#374151',
            plant: '#059669',
            plantPot: '#78350f',
            server: '#1f2937',
            serverLight: '#34d399',
            whiteboard: '#e2e8f0',
            coffee: '#92400e',
        };

        // ═══ ROOM LAYOUT ═══
        let currentRoom = 0; // 0 = Office, 1 = Server Room
        const ROOM = {
            floorX: 60,
            floorY: 80,
            floorW: 0,
            floorH: 0,
        };

        let stability = 100;
        let isExploded = false;
        let flashTimer = 0;
        let pulsarEnergy = 0;

        // ═══ 15 AGENTS GENERATION (3 DEPARTMENTS) ═══
        const agents = [];
        const rolesData = [
            { idPrefix: 'analyst', name: 'ANALYST', emoji: '🔍', color: '#22d3ee', role: 'Analyst', task: 'Data Analysis', body: '#3b82f6', skin: '#fbbf24' },
            { idPrefix: 'planner', name: 'PLANNER', emoji: '📋', color: '#8b5cf6', role: 'Planner', task: 'Optimization', body: '#8b5cf6', skin: '#fdba74' },
            { idPrefix: 'searcher', name: 'SEARCHER', emoji: '🔎', color: '#34d399', role: 'Searcher', task: 'Source Search', body: '#10b981', skin: '#fcd34d' }
        ];
        const hairColors = ['#451a03', '#fcd34d', '#111827', '#b91c1c', '#9ca3af', '#c084fc', '#ea580c'];

        for (let dept = 0; dept < rolesData.length; dept++) {
            for (let i = 0; i < 5; i++) {
                const r = rolesData[dept];
                agents.push({
                    id: `${r.idPrefix}_${i + 1}`,
                    name: `${r.name}-${i + 1}`,
                    emoji: r.emoji,
                    color: r.color,
                    role: r.role,
                    x: 0, y: 0, targetX: 0, targetY: 0, deskX: 0, deskY: 0,
                    state: Math.random() > 0.4 ? 'working' : (Math.random() > 0.5 ? 'thinking' : 'walking'),
                    frame: Math.floor(Math.random() * 100),
                    direction: 0,
                    task: r.task,
                    walkTimer: Math.floor(Math.random() * 400),
                    thinkBubble: '',
                    bodyColor: r.body,
                    skinColor: r.skin,
                    hairColor: hairColors[Math.floor(Math.random() * hairColors.length)],
                    hairType: Math.floor(Math.random() * 4),
                    accessory: Math.floor(Math.random() * 3),
                    clothingDetail: Math.floor(Math.random() * 4),
                    department: dept,
                    isManager: false,
                    isBroken: false,
                    repairTimer: 0,
                    room: 0,
                    targetRoom: 0,
                    gardenTimer: 0,
                    gardenStayDuration: 450 + Math.floor(Math.random() * 1350) // 15s to 60s at 60fps
                });
            }
        }

        const repairman = {
            id: 'repairman',
            name: 'TECH-FIX',
            color: '#f97316',
            x: ROOM.floorX + 20, y: ROOM.floorY + 20, targetX: ROOM.floorX + 20, targetY: ROOM.floorY + 20,
            state: 'idle',
            frame: 0,
            bodyColor: '#f97316',
            skinColor: '#fdba74',
            task: 'Maintenance',
            repairTarget: null,
            repairTimer: 0,
            room: 0
        };

        const beds = [
            { id: 'bed_1', x: 100, y: 120, occupiedBy: null },
            { id: 'bed_2', x: 200, y: 120, occupiedBy: null },
            { id: 'bed_3', x: 300, y: 120, occupiedBy: null },
            { id: 'bed_4', x: 400, y: 120, occupiedBy: null },
            { id: 'bed_5', x: 100, y: 220, occupiedBy: null },
            { id: 'bed_6', x: 200, y: 220, occupiedBy: null },
            { id: 'bed_7', x: 300, y: 220, occupiedBy: null },
            { id: 'bed_8', x: 400, y: 220, occupiedBy: null }
        ];

        const stars = Array.from({ length: 150 }, () => ({
            x: Math.random() * 2000,
            y: Math.random() * 2000,
            size: Math.random() * 1.5 + 0.5,
            opacity: Math.random(),
            speed: Math.random() * 0.05 + 0.02
        }));

        let particles = [];
        let officePlants = [];

        // ═══ COMPUTE 3-DEPARTMENT LAYOUT ═══
        function computeLayout() {
            ROOM.floorW = W - 120;
            ROOM.floorH = H - 40;

            officePlants = [
                { x: ROOM.floorX + 25, y: ROOM.floorY + 25, type: 0, isPlant: true },
                { x: ROOM.floorX + ROOM.floorW - 40, y: ROOM.floorY + 25, type: 1, isPlant: true },
                { x: ROOM.floorX + ROOM.floorW / 3 - 15, y: ROOM.floorY + ROOM.floorH - 50, type: 2, isPlant: true },
                { x: ROOM.floorX + 2 * ROOM.floorW / 3 - 15, y: ROOM.floorY + ROOM.floorH - 50, type: 0, isPlant: true },
                { x: ROOM.floorX + 25, y: ROOM.floorY + ROOM.floorH - 50, type: 1, isPlant: true }
            ];

            const mapCenterX = ROOM.floorX + ROOM.floorW / 2;
            const mapCenterY = ROOM.floorY + ROOM.floorH / 2;

            const deptWidth = ROOM.floorW / rolesData.length;

            agents.forEach((a, index) => {
                const posInDept = index % 5;

                const offsets = [
                    { x: -50, y: -55 },
                    { x: 50, y: -55 },
                    { x: -80, y: 35 },
                    { x: 0, y: 35 },
                    { x: 80, y: 35 }
                ];

                const deptCenterX = ROOM.floorX + deptWidth * a.department + deptWidth / 2;
                const deptCenterY = ROOM.floorY + ROOM.floorH / 2 - 20;

                a.deskX = deptCenterX + offsets[posInDept].x - 25;
                a.deskY = deptCenterY + offsets[posInDept].y;

                if (a.x === 0 && a.y === 0) {
                    a.x = mapCenterX;
                    a.y = mapCenterY;
                    a.targetX = a.deskX + 10;
                    a.targetY = a.deskY + 50;
                    a.state = 'walking';
                }
            });

            if (repairman.x === 0 && repairman.y === 0) {
                repairman.x = mapCenterX;
                repairman.y = mapCenterY;
                repairman.targetX = ROOM.floorX + 40;
                repairman.targetY = ROOM.floorY + 40;
                repairman.state = 'walking';
            }
        }
        computeLayout();
        window.addEventListener('resize', () => { resize(); computeLayout(); });

        // ═══ DRAWING FUNCTIONS ═══
        function drawFloor() {
            if (currentRoom === 2) {
                // Space Dome: Alien Blue Grass Texture
                ctx.fillStyle = '#06131c'; // Darker cyan-blue base
                ctx.fillRect(ROOM.floorX, ROOM.floorY, ROOM.floorW, ROOM.floorH);

                // Tile the grass texture
                if (grassTexture.complete) {
                    const pattern = ctx.createPattern(grassTexture, 'repeat');
                    ctx.fillStyle = pattern;
                    ctx.save();
                    ctx.translate(ROOM.floorX, ROOM.floorY);
                    ctx.fillRect(0, 0, ROOM.floorW, ROOM.floorH);
                    ctx.restore();
                }

                // Procedural Bio-luminescent Strands (Cyan and Light Green-Blue)
                for (let i = 0; i < ROOM.floorW; i += 25) {
                    for (let j = 0; j < ROOM.floorH; j += 25) {
                        const gx = ROOM.floorX + i + Math.sin(Date.now() / 600 + i) * 6;
                        const gy = ROOM.floorY + j + Math.cos(Date.now() / 800 + j) * 4;
                        const isAlt = (Math.floor(i / 25) + Math.floor(j / 25)) % 2 === 0;

                        ctx.strokeStyle = isAlt ? '#22d3ee55' : '#34d39955';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(gx, gy + 12);
                        ctx.lineTo(gx + 3, gy - 4);
                        ctx.stroke();

                        // Glowing tips
                        if (Math.random() < 0.1) {
                            ctx.fillStyle = isAlt ? '#22d3ee' : '#34d399';
                            ctx.beginPath();
                            ctx.arc(gx + 3, gy - 4, 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                return;
            }
            const floorColor = currentRoom === 0 ? C.floor : '#0f172a';
            const floorAltColor = currentRoom === 0 ? C.floorAlt : '#1e293b';

            for (let x = ROOM.floorX; x < ROOM.floorX + ROOM.floorW; x += TILE) {
                for (let y = ROOM.floorY; y < ROOM.floorY + ROOM.floorH; y += TILE) {
                    const alt = ((x / TILE + y / TILE) % 2 === 0);
                    ctx.fillStyle = alt ? floorColor : floorAltColor;
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                    ctx.strokeRect(x, y, TILE, TILE);
                }
            }

            const deptWidth = ROOM.floorW / rolesData.length;

            for (let i = 0; i < rolesData.length; i++) {
                const r = rolesData[i];
                const deptCenterX = ROOM.floorX + deptWidth * i + deptWidth / 2;
                const deptCenterY = ROOM.floorY + ROOM.floorH / 2 - 20;

                ctx.fillStyle = `${r.color}14`;
                ctx.strokeStyle = `${r.color}4D`;
                ctx.lineWidth = 1;

                const rugW = Math.min(280, deptWidth - 10);
                const rugH = 220;
                const rugX = deptCenterX - rugW / 2;
                const rugY = deptCenterY - rugH / 2;

                roundRect(rugX, rugY, rugW, rugH, 8);
                ctx.fill();

                ctx.setLineDash([4, 4]);
                roundRect(rugX + 4, rugY + 4, rugW - 8, rugH - 8, 4);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.fillStyle = `${r.color}80`;
                ctx.font = '8px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.globalAlpha = 0.5;
                ctx.fillText(`[ ${r.name} DEPT ]`, deptCenterX, rugY + rugH - 12);
                ctx.globalAlpha = 1;
            }

            // Dual Doors
            ctx.fillStyle = '#451a03';
            ctx.strokeStyle = '#92400e';
            ctx.lineWidth = 2;

            if (currentRoom === 0) {
                // Office Doors: Left (to Dome) and Right (to Server)
                ctx.fillRect(ROOM.floorX + ROOM.floorW - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);
                ctx.strokeRect(ROOM.floorX + ROOM.floorW - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);

                ctx.fillStyle = '#0e7490'; // Cyan-ish for dome door
                ctx.fillRect(ROOM.floorX - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);
                ctx.strokeRect(ROOM.floorX - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);
            } else if (currentRoom === 1) {
                // Server Room: Left Door (to Office)
                ctx.fillRect(ROOM.floorX - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);
                ctx.strokeRect(ROOM.floorX - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);
            } else if (currentRoom === 2) {
                // Space Dome: Space Background & Right Door (to Office)
                stars.forEach(s => {
                    s.y += s.speed;
                    if (s.y > 2000) s.y = 0;
                    ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                    ctx.beginPath();
                    ctx.arc(s.x % W, s.y % H, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Glass Dome
                const grad = ctx.createRadialGradient(
                    ROOM.floorX + ROOM.floorW / 2, ROOM.floorY + ROOM.floorH / 2, 100,
                    ROOM.floorX + ROOM.floorW / 2, ROOM.floorY + ROOM.floorH / 2, ROOM.floorW / 1.5
                );
                grad.addColorStop(0, 'rgba(34, 211, 238, 0.05)');
                grad.addColorStop(1, 'rgba(34, 211, 238, 0.2)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(ROOM.floorX + ROOM.floorW / 2, ROOM.floorY + ROOM.floorH / 2, ROOM.floorW / 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#0e7490';
                ctx.fillRect(ROOM.floorX + ROOM.floorW - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);
                ctx.strokeRect(ROOM.floorX + ROOM.floorW - 4, ROOM.floorY + ROOM.floorH / 2 - 30, 8, 60);
            }
        }

        function drawBeds() {
            beds.forEach(b => {
                const bx = ROOM.floorX + b.x;
                const by = ROOM.floorY + b.y;
                // Bed frame
                ctx.fillStyle = '#78350f';
                ctx.fillRect(bx, by, 64, 32);
                ctx.fillStyle = '#92400e';
                ctx.fillRect(bx + 2, by + 2, 60, 28);
                // Sheet
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(bx + 15, by + 4, 45, 24);
                // Pillow
                ctx.fillStyle = '#f1f5f9';
                ctx.fillRect(bx + 50, by + 6, 8, 20);

                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(bx, by + 32, 64, 4);
            });
        }

        function drawWalls() {
            if (currentRoom === 2) {
                // Draw Glass Ceiling for Garden
                const wy = ROOM.floorY - 50;
                const wh = 50;

                // Draw Starry Sky Background in the glass area
                ctx.fillStyle = '#080b14';
                ctx.fillRect(ROOM.floorX, wy, ROOM.floorW, wh);

                stars.forEach(s => {
                    const sx = (s.x % ROOM.floorW) + ROOM.floorX;
                    const sy = (s.y % wh) + wy;
                    ctx.fillStyle = `rgba(255,255,255,${s.opacity * 0.8})`;
                    ctx.beginPath();
                    ctx.arc(sx, sy, s.size * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Glass Pane Effect
                const grad = ctx.createLinearGradient(ROOM.floorX, wy, ROOM.floorX, wy + wh);
                grad.addColorStop(0, 'rgba(34, 211, 238, 0.2)');
                grad.addColorStop(0.5, 'rgba(34, 211, 238, 0.05)');
                grad.addColorStop(1, 'rgba(34, 211, 238, 0.2)');
                ctx.fillStyle = grad;
                ctx.fillRect(ROOM.floorX, wy, ROOM.floorW, wh);

                // Glass Shine
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(ROOM.floorX, wy + 10);
                ctx.lineTo(ROOM.floorX + ROOM.floorW, wy + 40);
                ctx.stroke();

                // Top and Bottom Rails
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(ROOM.floorX, wy - 4, ROOM.floorW, 4);
                ctx.fillRect(ROOM.floorX, wy + wh - 2, ROOM.floorW, 2);

                return;
            }
            ctx.fillStyle = C.wall;
            ctx.fillRect(ROOM.floorX, ROOM.floorY - 50, ROOM.floorW, 50);

            ctx.fillStyle = C.wallTop;
            ctx.fillRect(ROOM.floorX, ROOM.floorY - 54, ROOM.floorW, 4);

            ctx.fillStyle = C.wallAccent;
            ctx.globalAlpha = 0.4;
            ctx.fillRect(ROOM.floorX, ROOM.floorY - 8, ROOM.floorW, 3);
            ctx.globalAlpha = 1;

            for (let i = 0; i < rolesData.length; i++) {
                const wx = ROOM.floorX + (ROOM.floorW / rolesData.length) * i + (ROOM.floorW / (rolesData.length * 2)) - 35;
                const wy = ROOM.floorY - 44;

                ctx.fillStyle = '#1e293b';
                ctx.fillRect(wx, wy, 70, 34);

                const gradient = ctx.createLinearGradient(wx, wy, wx, wy + 34);
                gradient.addColorStop(0, '#0c1445');
                gradient.addColorStop(1, '#1e1b4b');
                ctx.fillStyle = gradient;
                ctx.fillRect(wx + 2, wy + 2, 66, 30);

                ctx.fillStyle = '#fff';
                for (let s = 0; s < 5; s++) {
                    const sx = wx + 5 + ((s * 17 + i * 7 + Math.floor(Date.now() / 3000)) % 60);
                    const sy = wy + 5 + ((s * 11 + i * 13) % 25);
                    ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 1000 + s * 2) * 0.3;
                    ctx.fillRect(sx, sy, 1, 1);
                }
                ctx.globalAlpha = 1;

                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 2;
                ctx.strokeRect(wx, wy, 70, 34);
            }

            ctx.fillStyle = C.wall;
            ctx.fillRect(ROOM.floorX - 10, ROOM.floorY - 50, 10, ROOM.floorH + 50);
        }

        function drawDesk(x, y, agent) {
            ctx.fillStyle = C.chair;
            roundRect(x + 12, y + 48, 24, 20, 4);
            ctx.fill();

            ctx.fillStyle = agent.bodyColor || '#3b82f6';
            ctx.globalAlpha = 0.3;
            roundRect(x + 14, y + 44, 20, 6, 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            ctx.fillStyle = C.desk;
            ctx.fillRect(x, y, 50, 30);

            ctx.fillStyle = C.deskTop;
            ctx.fillRect(x - 2, y - 2, 54, 6);

            ctx.fillStyle = '#5c2d0e';
            ctx.fillRect(x + 2, y + 28, 4, 8);
            ctx.fillRect(x + 44, y + 28, 4, 8);

            ctx.fillStyle = C.screen;
            ctx.fillRect(x + 10, y + 2, 30, 20);

            const glowIntensity = agent.isBroken ? (0.6 + Math.sin(Date.now() / 100) * 0.4) : (agent.state === 'working' ? 0.8 : (agent.state === 'thinking' ? 0.4 : 0.1));
            const screenColor = agent.isBroken ? '#ef4444' : (agent.state === 'working' ? agent.color : (agent.state === 'thinking' ? '#fbbf24' : '#334155'));

            ctx.fillStyle = screenColor;
            ctx.globalAlpha = glowIntensity;
            ctx.fillRect(x + 12, y + 4, 26, 16);

            if (!agent.isBroken && (agent.state === 'working' || agent.state === 'thinking')) {
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = 0.3;
                const lines = agent.state === 'working' ? 4 : 2;
                for (let l = 0; l < lines; l++) {
                    const lw = 8 + Math.sin(Date.now() / 500 + l * 3) * 6;
                    ctx.fillRect(x + 14, y + 6 + l * 3.5, lw, 1.5);
                }
            } else if (agent.isBroken) {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('ERR!', x + 25, y + 15);
            }
            ctx.globalAlpha = 1;

            ctx.fillStyle = '#374151';
            ctx.fillRect(x + 22, y + 22, 6, 4);

            ctx.fillStyle = '#1e293b';
            ctx.fillRect(x + 13, y + 25, 24, 4);
            if (agent.state === 'working') {
                ctx.fillStyle = agent.color;
                ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 100) * 0.2;
                for (let k = 0; k < 5; k++) {
                    ctx.fillRect(x + 14 + k * 4.5, y + 26, 2.5, 2);
                }
                ctx.globalAlpha = 1;
            }

            if (agent.state === 'working') {
                ctx.fillStyle = agent.color;
                ctx.globalAlpha = 0.06;
                ctx.fillRect(x - 10, y - 10, 70, 50);
                ctx.globalAlpha = 1;
            }

            if (parseInt(agent.id.split('_')[1]) % 2 === 0) {
                ctx.fillStyle = '#f5f5f4';
                ctx.fillRect(x + 42, y + 8, 6, 7);
                ctx.fillStyle = C.coffee;
                ctx.fillRect(x + 43, y + 9, 4, 3);
            }
        }

        function drawAgent(agent) {
            const x = Math.round(agent.x);
            const y = Math.round(agent.y);
            const t = Date.now() / 1000;

            const bounce = agent.state === 'walking' ? Math.abs(Math.sin(t * 12)) * 4 : Math.sin(t * 2 + agent.frame * 0.1) * 1;
            const sway = agent.state === 'walking' ? Math.sin(t * 12) * 2 : 0;
            const breathe = Math.sin(t * 2 + agent.frame * 0.1) * 0.5;
            const tilt = agent.state === 'walking' ? 0.05 : (agent.state === 'thinking' ? Math.sin(t * 0.5) * 0.05 : 0);

            const shakeX = agent.state === 'crazy' ? (Math.random() - 0.5) * 4 : 0;
            const shakeY = agent.state === 'crazy' ? (Math.random() - 0.5) * 4 : 0;

            ctx.save();
            ctx.translate(x + 10 + shakeX, y + 32 + shakeY);
            ctx.rotate(tilt);
            ctx.translate(-(x + 10), -(y + 32));

            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(x + 10 + sway, y + 32, 12 + breathe, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            const bodyColor = agent.bodyColor || '#3b82f6';
            ctx.fillStyle = bodyColor;
            roundRect(x + 2 + sway, y + 14 - bounce, 16, 14 + breathe, 4);
            ctx.fill();

            // Clothing
            const bx = x + 2 + sway;
            const by = y + 14 - bounce;
            const bw = 16;
            const bh = 14 + breathe;

            if (agent.clothingDetail === 1) { // Tie
                ctx.fillStyle = '#b91c1c';
                ctx.fillRect(bx + 6, by, 4, 8);
                ctx.beginPath(); ctx.moveTo(bx + 6, by + 8); ctx.lineTo(bx + 10, by + 8); ctx.lineTo(bx + 8, by + 11); ctx.fill();
            } else if (agent.clothingDetail === 2) { // Stripes
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(bx, by + 4, bw, 3);
                ctx.fillRect(bx, by + 9, bw, 3);
            } else if (agent.clothingDetail === 3) { // Suspenders
                ctx.fillStyle = darkenColor(bodyColor, 0.4);
                ctx.fillRect(bx + 3, by, 2, bh);
                ctx.fillRect(bx + 11, by, 2, bh);
            }

            const headBounce = bounce * 0.8;
            const headSway = sway * 0.5;
            const headX = x + 10 + headSway;
            const headY = y + 7 - headBounce;

            ctx.fillStyle = agent.skinColor;
            ctx.beginPath();
            ctx.arc(headX, headY, 7, 0, Math.PI * 2);
            ctx.fill();

            // Hair
            if (agent.id !== 'repairman') {
                ctx.fillStyle = agent.hairColor;
                if (agent.hairType === 0) { // Short
                    ctx.beginPath(); ctx.arc(headX, headY - 2, 7.5, Math.PI, 0); ctx.fill();
                } else if (agent.hairType === 2) { // Spiky
                    ctx.beginPath();
                    for (let i = 0; i <= 6; i++) {
                        ctx.lineTo(headX - 7.5 + i * 2.5, headY - 2 - (i % 2 === 0 ? 5 : 1));
                    }
                    ctx.lineTo(headX + 7.5, headY - 2);
                    ctx.fill();
                } else if (agent.hairType === 3) { // Long
                    ctx.beginPath(); ctx.arc(headX, headY - 2, 7.5, Math.PI, 0); ctx.fill();
                    ctx.fillRect(headX - 7.5, headY - 2, 3, 9);
                    ctx.fillRect(headX + 4.5, headY - 2, 3, 9);
                }
            }

            if (agent.id === 'repairman') {
                ctx.fillStyle = '#475569';
                ctx.fillRect(headX - 8, headY - 10, 16, 6);
                ctx.fillStyle = agent.color;
                ctx.fillRect(headX - 6, headY - 8, 12, 4);
                ctx.fillStyle = '#451a03';
                ctx.fillRect(x + 2 + sway, y + 22 - bounce, 16, 3);
            } else if (agent.department === 0) {
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(headX - 6, headY - 3, 12, 4);
                ctx.fillStyle = agent.color;
                ctx.fillRect(headX - 5, headY - 2, 10, 2);
            } else if (agent.department === 1) {
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(headX, headY, 8, Math.PI, 0); ctx.stroke();
                ctx.fillStyle = agent.color;
                ctx.beginPath(); ctx.arc(headX - 8, headY, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(headX + 8, headY, 2.5, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.fillStyle = agent.state === 'crazy' ? '#f87171' : agent.color;
                ctx.beginPath(); ctx.arc(headX + 4, headY - 1, 3.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(headX + 4.5, headY - 1.5, 1.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = agent.state === 'crazy' ? '#7f1d1d' : '#1e293b';
                ctx.fillRect(headX - 4, headY - 2, 2, 2);
            }

            // Accessories
            if (agent.id !== 'repairman') {
                if (agent.accessory === 1) { // Glasses
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(headX + 1, headY - 2, 4, 3);
                    ctx.strokeRect(headX + 7, headY - 2, 4, 3);
                    ctx.beginPath(); ctx.moveTo(headX + 5, headY - 0.5); ctx.lineTo(headX + 7, headY - 0.5); ctx.stroke();
                } else if (agent.accessory === 2) { // Headset
                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(headX, headY, 8.5, Math.PI, 0); ctx.stroke();
                    ctx.fillStyle = '#1e293b';
                    ctx.fillRect(headX - 9, headY - 2, 3, 5);
                    ctx.fillStyle = agent.color;
                    ctx.fillRect(headX + 6, headY + 2, 3, 1.5);
                }
            }

            ctx.fillStyle = '#1e293b';
            if (agent.state === 'walking') {
                const legMove = Math.sin(t * 12) * 6;
                ctx.fillRect(x + 5 + sway, y + 28 - bounce, 4, 6 + legMove);
                ctx.fillRect(x + 11 + sway, y + 28 - bounce, 4, 6 - legMove);
            } else {
                ctx.fillRect(x + 5 + sway, y + 28 - bounce, 4, 5);
                ctx.fillRect(x + 11 + sway, y + 28 - bounce, 4, 5);
            }

            ctx.fillStyle = darkenColor(bodyColor, 0.8);
            if (agent.state === 'working') {
                const type1 = Math.sin(t * 8 + agent.frame) * 4;
                const type2 = Math.cos(t * 7 + agent.frame) * 4;
                ctx.fillRect(x - 2 + sway, y + 16 - bounce, 4, 6 + type1);
                ctx.fillRect(x + 18 + sway, y + 16 - bounce, 4, 6 + type2);
                ctx.fillStyle = agent.skinColor;
                ctx.fillRect(x - 2 + sway, y + 22 - bounce + type1, 4, 3);
                ctx.fillRect(x + 18 + sway, y + 22 - bounce + type2, 4, 3);
            } else if (agent.state === 'walking') {
                const armSwing = Math.sin(t * 12) * 8;
                ctx.fillRect(x - 2 + sway, y + 16 - bounce, 4, 8 + armSwing);
                ctx.fillRect(x + 18 + sway, y + 16 - bounce, 4, 8 - armSwing);
            } else if (agent.state === 'thinking' || agent.isBroken) {
                ctx.fillRect(x - 2 + sway, y + 16 - bounce, 4, 6);
                ctx.fillRect(x + 18 + sway, y + 16 - bounce, 4, 6);
                ctx.fillStyle = agent.skinColor;
                if (agent.isBroken) {
                    ctx.fillRect(headX - 2, headY, 4, 4);
                } else {
                    ctx.fillRect(headX + 3, headY + 3, 4, 4);
                }
            } else if (agent.state === 'repairing') {
                const fixMove = Math.sin(t * 25) * 5;
                ctx.fillRect(x - 2 + sway, y + 16 - bounce, 4, 8 + fixMove);
                ctx.fillRect(x + 18 + sway, y + 16 - bounce, 4, 8 - fixMove);
                if (Math.random() > 0.8) {
                    particles.push({ x: x + 10, y: y + 20, vx: (Math.random() - 0.5) * 4, vy: -Math.random() * 4, life: 30, color: '#fbbf24' });
                }
            } else {
                ctx.fillRect(x - 2 + sway, y + 16 - bounce, 4, 8);
                ctx.fillRect(x + 18 + sway, y + 16 - bounce, 4, 8);
                ctx.fillStyle = agent.skinColor;
                ctx.fillRect(x - 2 + sway, y + 24 - bounce, 4, 3);
                ctx.fillRect(x + 18 + sway, y + 24 - bounce, 4, 3);
            }

            ctx.restore();

            ctx.fillStyle = agent.color;
            ctx.font = '6px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(agent.name.split('-')[1], x + 10, y - 8);
            if (agent.isManager) ctx.fillText('👑', x + 10, y - 16);

            const statusColors = { working: '#34d399', thinking: '#fbbf24', sleeping: '#64748b', walking: '#22d3ee', relaxed: '#8b5cf6', crazy: '#f87171' };
            ctx.fillStyle = statusColors[agent.state] || '#64748b';
            ctx.beginPath(); ctx.arc(x + 22, y - 8, 3, 0, Math.PI * 2); ctx.fill();

            if (agent.state === 'thinking' || agent.state === 'relaxed') drawThoughtBubble(x, y, agent);
            else if (agent.state === 'working') drawWorkIndicator(x, y, agent);
            else if (agent.state === 'sleeping') drawSleepZzz(x, y, agent);
            else if (agent.state === 'crazy') {
                if (Math.random() > 0.8) {
                    const bubbleTexts = ['!!!', 'ERROR', 'HELP', 'AAA', 'PANIC'];
                    agent.thinkBubble = bubbleTexts[Math.floor(Math.random() * bubbleTexts.length)];
                }
                drawThoughtBubble(x, y, agent);
            }
        }

        function drawThoughtBubble(x, y, agent) {
            const bx = x + 20;
            const by = y - 22;

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.beginPath(); ctx.arc(x + 16, y - 4, 1.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 19, y - 10, 2, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = 'rgba(30, 30, 60, 0.9)';
            ctx.strokeStyle = agent.color;
            ctx.lineWidth = 1;
            roundRect(bx, by, 40, 14, 4);
            ctx.fill();
            ctx.globalAlpha = 0.5;
            roundRect(bx, by, 40, 14, 4);
            ctx.stroke();
            ctx.globalAlpha = 1;

            ctx.fillStyle = agent.state === 'crazy' ? '#f87171' : '#fbbf24';
            ctx.font = '5px "Press Start 2P"';
            ctx.textAlign = 'left';
            const thinkTexts = agent.state === 'relaxed' ? ['🌸', '🍃', '✨', '🧘'] : (agent.state === 'crazy' ? [agent.thinkBubble || '!!!'] : ['🤔...', '💡!', '⚡...', '🧮...']);
            ctx.fillText(thinkTexts[(Math.floor(Date.now() / 3000) + parseInt(agent.id.split('_')[1])) % thinkTexts.length], bx + 4, by + 10);
        }

        function drawWorkIndicator(x, y, agent) {
            const t = Date.now() / 600;
            ctx.fillStyle = agent.color;
            ctx.globalAlpha = 0.6;
            for (let i = 0; i < 2; i++) {
                const px = x + 10 + Math.cos(t + i * 3) * 12;
                const py = y - 8 + Math.sin(t + i * 3) * 5;
                ctx.fillRect(px, py, 1.5, 1.5);
            }
            ctx.globalAlpha = 1;
        }

        function drawSleepZzz(x, y, agent) {
            ctx.font = '5px "Press Start 2P"';
            ctx.textAlign = 'left';
            const t = Date.now() / 1000 + parseInt(agent.id.split('_')[1]);
            ctx.fillStyle = '#64748b';
            ctx.globalAlpha = 0.4 + Math.sin(t) * 0.3;
            ctx.fillText('z', x + 18, y - 2 - (t % 3) * 3);
            ctx.globalAlpha = 0.3 + Math.sin(t + 1) * 0.2;
            ctx.fillText('z', x + 22, y - 8 - (t % 3) * 2);
            ctx.globalAlpha = 1;
        }








        function drawPulsar(cx, cy, size) {
            const t = Date.now() / 1000;
            const pulse = Math.sin(t * 4) * 2;
            const instability = (100 - stability) / 100;
            
            ctx.save();
            ctx.translate(cx, cy);
            
            // Outer Glow
            const glowSize = size + 15 + pulse + (instability * 10);
            const glow = ctx.createRadialGradient(0, 0, size/2, 0, 0, glowSize);
            const coreColor = isExploded ? `rgba(248, 113, 113, ${0.5 + instability * 0.4})` : `rgba(34, 211, 238, ${0.4 + instability * 0.4})`;
            glow.addColorStop(0, coreColor);
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
            ctx.fill();

            // Spinning Image
            if (pulsarImg.complete) {
                ctx.rotate(t * 0.3); // Slow spin
                const drawSize = (size + pulse) * (1 + instability * 0.2) * 2.5;
                if (isExploded) {
                    ctx.filter = 'hue-rotate(-120deg) saturate(1.5) brightness(1.2)';
                }
                ctx.globalCompositeOperation = 'screen';
                ctx.drawImage(pulsarImg, -drawSize/2, -drawSize/2, drawSize, drawSize);
                ctx.globalCompositeOperation = 'source-over';
                ctx.filter = 'none';
            } else {
                ctx.fillStyle = isExploded ? '#ef4444' : '#22d3ee';
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const r = size + pulse + Math.sin(t * 10 + i) * 3;
                    ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }

        function triggerExplosion() {
            stability = 0;
            isExploded = true;
            flashTimer = 60; // 1 second flash
            addLog('system_0', '🚨 WARNING: STABILITY COLLAPSE!');
            addLog('system_0', '🔴 CELLULAR PULSAR OVERLOADED!');

            agents.forEach(a => {
                a.state = 'crazy';
                a.task = 'OVERLOADED';
            });
        }
        function drawEnvironment() {
            // Main Pulsar on the office wall (Circled red position)
            if (currentRoom === 0) {
                // Higher up from center
                drawPulsar(ROOM.floorX + ROOM.floorW / 2, ROOM.floorY + ROOM.floorH / 2 - 200, 24);
            }

            const sx = ROOM.floorX + 10;
            const sy = ROOM.floorY + 20;

            ctx.fillStyle = C.server;
            ctx.fillRect(sx, sy, 30, 60);
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 1;
            ctx.strokeRect(sx, sy, 30, 60);

            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = '#111827';
                ctx.fillRect(sx + 4, sy + 6 + i * 14, 22, 10);

                const on = Math.sin(Date.now() / 500 + i * 1.5) > 0;
                ctx.fillStyle = on ? C.serverLight : '#1f2937';
                ctx.fillRect(sx + 6, sy + 8 + i * 14, 3, 3);
                ctx.fillStyle = Math.sin(Date.now() / 700 + i) > 0 ? '#fbbf24' : '#1f2937';
                ctx.fillRect(sx + 11, sy + 8 + i * 14, 3, 3);
            }

            const cx = ROOM.floorX + ROOM.floorW - 50;
            const cy = ROOM.floorY + ROOM.floorH - 80;

            ctx.fillStyle = '#374151';
            ctx.fillRect(cx, cy, 24, 30);
            ctx.fillStyle = '#1f2937';
            ctx.fillRect(cx + 4, cy + 4, 16, 10);

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            const st = Date.now() / 800;
            ctx.beginPath();
            ctx.moveTo(cx + 8, cy - 2);
            ctx.quadraticCurveTo(cx + 6 + Math.sin(st) * 4, cy - 10, cx + 10, cy - 16);
            ctx.stroke();

            ctx.fillStyle = '#475569';
            ctx.font = '4px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('☕', cx + 12, cy + 42);
        }

        function spawnParticle(from, to, color) {
            particles.push({
                x: from.x + 10, y: from.y + 10,
                tx: to.x + 10, ty: to.y + 10,
                progress: 0, color: color, size: 2.5,
            });
        }

        function updateParticles() {
            particles = particles.filter(p => {
                p.progress += 0.02;
                p.x = lerp(p.x, p.tx, p.progress);
                p.y = lerp(p.y, p.ty, p.progress);
                return p.progress < 1;
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = 1 - p.progress;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.globalAlpha = (1 - p.progress) * 0.4;
                ctx.beginPath();
                ctx.arc(p.x - (p.tx - p.x) * 0.05, p.y - (p.ty - p.y) * 0.05, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function updateAgents() {
            agents.forEach(a => {
                // Ship Stability Logic
                if (!isExploded) {
                    if (a.state === 'working' || a.state === 'thinking') stability += 0.005;
                    else if (a.state === 'relaxed' || a.state === 'sleeping') stability -= 0.01;
                    else stability -= 0.002;
                }

                if (stability > 100) stability = 100;
                if (stability < 0) stability = 0;

                if (stability === 0 && !isExploded) {
                    triggerExplosion();
                }

                if (a.state === 'crazy') {
                    if (Math.random() < 0.05) {
                        a.targetX = ROOM.floorX + Math.random() * ROOM.floorW;
                        a.targetY = ROOM.floorY + Math.random() * ROOM.floorH;
                    }
                    const dx = a.targetX - a.x;
                    const dy = a.targetY - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 5) {
                        a.x += (dx / dist) * 4;
                        a.y += (dy / dist) * 4;
                    }
                }

                if (a.state === 'walking') {
                    const dx = a.targetX - a.x;
                    const dy = a.targetY - a.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 2) {
                        a.x += (dx / dist) * 1.5;
                        a.y += (dy / dist) * 1.5;
                    } else {
                        a.x = a.targetX;
                        a.y = a.targetY;
                        if (Math.abs(a.x - (a.deskX + 10)) < 5 && Math.abs(a.y - (a.deskY + 50)) < 5) {
                            a.state = a.room === 2 ? 'relaxed' : (Math.random() > 0.3 ? 'working' : 'thinking');
                        }
                    }
                    // ROOM BOUNDARIES (adjusted for door triggers)
                    a.x = Math.max(ROOM.floorX, Math.min(ROOM.floorX + ROOM.floorW, a.x));
                    a.y = Math.max(ROOM.floorY + 5, Math.min(ROOM.floorY + ROOM.floorH - 35, a.y));
                }

                a.walkTimer++;
                if (a.walkTimer > 300 + Math.random() * 600) {
                    a.walkTimer = 0;
                    const rand = Math.random();

                    if (rand < 0.1 && a.state !== 'walking') {
                        a.state = 'walking';
                        const destinations = [
                            { x: Math.max(ROOM.floorX + 20, Math.min(ROOM.floorX + ROOM.floorW - 80, ROOM.floorX + ROOM.floorW - 60)), y: ROOM.floorY + ROOM.floorH - 90 }, // Coffee
                            { x: ROOM.floorX + 30, y: ROOM.floorY + 50 }, // Server
                            { x: ROOM.floorX + 60 + Math.random() * (ROOM.floorW - 120), y: ROOM.floorY + 60 + Math.random() * (ROOM.floorH - 120) },
                        ];
                        const dest = destinations[Math.floor(Math.random() * destinations.length)];
                        a.targetX = dest.x;
                        a.targetY = dest.y;
                    } else if (rand < 0.3) {
                        a.state = 'walking';
                        a.targetX = a.deskX + 10;
                        a.targetY = a.deskY + 50;
                    } else if (rand < 0.5) {
                        a.state = a.room === 2 ? 'relaxed' : 'thinking';
                    } else if (rand < 0.9) {
                        a.state = a.room === 2 ? 'relaxed' : 'working';
                    } else if (rand < 0.95) {
                        // Go to Space Dome to relax if in Office
                        if (a.room === 0) {
                            a.targetX = ROOM.floorX;
                            a.targetY = ROOM.floorY + ROOM.floorH / 2;
                            a.state = 'walking';
                            a.targetRoom = 2;
                            a.task = 'Going to Garden';
                        } else {
                            a.state = 'working';
                        }
                    } else {
                        a.state = 'sleeping';
                    }
                }

                // Restriction: No working in Garden
                if (a.room === 2) {
                    if (a.state === 'working' || a.state === 'thinking') {
                        a.state = 'relaxed';
                    }
                    if (a.state === 'relaxed') {
                        a.task = 'Relaxing in Garden';
                        a.gardenTimer++;
                        if (a.gardenTimer > a.gardenStayDuration) {
                            a.targetX = ROOM.floorX + ROOM.floorW;
                            a.targetY = ROOM.floorY + ROOM.floorH / 2;
                            a.state = 'walking';
                            a.targetRoom = 0;
                            a.gardenTimer = 0;
                            a.gardenStayDuration = 450 + Math.floor(Math.random() * 1350);
                        }
                    } else {
                        a.gardenTimer = 0;
                    }
                } else if (a.room === 0) {
                    a.gardenTimer = 0;
                }

                // Hardware failure logic (only in Office) - reduced frequency
                if (a.state === 'working' && a.room === 0 && !a.isBroken && Math.random() < 0.0001) {
                    a.isBroken = true;
                    a.task = 'SYSTEM FAILURE';
                    addLog(a.id, '🔴 Hardware failure detected!');
                }
                a.frame++;

                if (a.state === 'sleeping') {
                    if (a.room === 0) {
                        // Move to room transition door
                        a.targetX = ROOM.floorX + ROOM.floorW;
                        a.targetY = ROOM.floorY + ROOM.floorH / 2;
                        a.state = 'walking';
                        a.targetRoom = 1;
                    } else if (!a.bedId) {
                        // Find an empty bed in room 1
                        const bed = beds.find(b => !b.occupiedBy);
                        if (bed) {
                            bed.occupiedBy = a.id;
                            a.bedId = bed.id;
                            a.targetX = ROOM.floorX + bed.x + 10;
                            a.targetY = ROOM.floorY + bed.y + 10;
                            a.state = 'walking';
                        }
                    }
                } else {
                    if (a.room === 1) {
                        // Move to room transition door (back to office)
                        a.targetX = ROOM.floorX;
                        a.targetY = ROOM.floorY + ROOM.floorH / 2;
                        a.state = 'walking';
                        a.targetRoom = 0;
                        if (a.bedId) {
                            const bed = beds.find(b => b.id === a.bedId);
                            if (bed) bed.occupiedBy = null;
                            a.bedId = null;
                        }
                    } else if (a.room === 2) {
                        // Return from Space Dome after some time (handling in walkTimer)
                        // If they are not targeted to room 2 anymore, they should head back
                        if (a.targetRoom !== 2) {
                            a.targetX = ROOM.floorX + ROOM.floorW;
                            a.targetY = ROOM.floorY + ROOM.floorH / 2;
                            a.state = 'walking';
                            a.targetRoom = 0;
                        }
                    }
                }

                // Dual Door Teleportation logic
                if (a.state === 'walking') {
                    // Right Door boundary (Room 0 -> Room 1)
                    if (a.room === 0 && a.x >= ROOM.floorX + ROOM.floorW - 10) {
                        if (a.targetRoom === 1) {
                            a.room = 1;
                            a.x = ROOM.floorX + 15;
                            addLog(a.id, `Entering Server Room...`);
                        }
                    }
                    // Left Door boundary (Room 0 -> Room 2)
                    else if (a.room === 0 && a.x <= ROOM.floorX + 10) {
                        if (a.targetRoom === 2) {
                            a.room = 2;
                            a.x = ROOM.floorX + ROOM.floorW - 15;
                            addLog(a.id, `Entering Space Dome...`);
                        }
                    }
                    // Left Door boundary (Room 1 -> Room 0)
                    else if (a.room === 1 && a.x <= ROOM.floorX + 10) {
                        if (a.targetRoom === 0) {
                            a.room = 0;
                            a.x = ROOM.floorX + ROOM.floorW - 15;
                            addLog(a.id, `Returning to Office...`);
                        }
                    }
                    // Right Door boundary (Room 2 -> Room 0)
                    else if (a.room === 2 && a.x >= ROOM.floorX + ROOM.floorW - 10) {
                        if (a.targetRoom === 0) {
                            a.room = 0;
                            a.x = ROOM.floorX + 15;
                            addLog(a.id, `Returning to Office...`);
                        }
                    }
                }
            });

            updateRepairman();

            if (Math.random() < 0.1) {
                const from = agents[Math.floor(Math.random() * agents.length)];
                const to = agents[Math.floor(Math.random() * agents.length)];
                if (from !== to && from.state === 'working' && (Math.random() > 0.5 || from.department === to.department)) {
                    spawnParticle(from, to, from.color);
                }
            }
        }

        function drawControlPanel(x, y) {
            ctx.save();
            ctx.translate(x, y);
            // Housing
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, 0, 60, 40);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(0, 0, 60, 40);
            // Screen
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(4, 4, 40, 25);
            ctx.strokeStyle = '#22d3ee33';
            ctx.strokeRect(4, 4, 40, 25);
            // Dynamic wave
            const t = Date.now() / 1000;
            ctx.strokeStyle = stability < 30 ? '#f87171' : '#22d3ee';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i <= 40; i += 2) {
                const waveY = 16 + Math.sin(t * 6 + i * 0.3) * (5 + (100 - stability) * 0.08);
                if (i === 0) ctx.moveTo(4 + i, waveY);
                else ctx.lineTo(4 + i, waveY);
            }
            ctx.stroke();
            // Buttons
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = (Math.sin(t * 10 + i) > 0.5) ? '#10b981' : '#064e3b';
                ctx.fillRect(48, 4 + i * 9, 8, 6);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 0.5;
                ctx.strokeRect(48, 4 + i * 9, 8, 6);
            }
            ctx.restore();
        }

        function updateRepairman() {
            const r = repairman;
            r.frame++;

            if (r.state === 'idle') {
                const broken = agents.find(a => a.isBroken && !a.beingRepaired);
                if (broken) {
                    r.repairTarget = broken;
                    broken.beingRepaired = true;
                    r.state = 'walking';
                    r.targetX = broken.deskX + 10;
                    r.targetY = broken.deskY + 50;
                    addLog(r.id, `Navigating to ${broken.id} for repair...`);
                } else {
                    const idleX = ROOM.floorX + 40;
                    const idleY = ROOM.floorY + 40;
                    if (Math.abs(r.x - idleX) > 5 || Math.abs(r.y - idleY) > 5) {
                        r.state = 'walking';
                        r.targetX = idleX; r.targetY = idleY;
                    }
                }
            } else if (r.state === 'walking') {
                const dx = r.targetX - r.x;
                const dy = r.targetY - r.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 2) {
                    r.x += (dx / dist) * 2;
                    r.y += (dy / dist) * 2;
                } else {
                    r.x = r.targetX; r.y = r.targetY;
                    if (r.repairTarget) {
                        r.state = 'repairing';
                        r.repairTimer = 150;
                        addLog(r.id, `Repairing ${r.repairTarget.id}...`);
                    } else {
                        r.state = 'idle';
                    }
                }
                // ROOM BOUNDARIES
                r.x = Math.max(ROOM.floorX + 5, Math.min(ROOM.floorX + ROOM.floorW - 25, r.x));
                r.y = Math.max(ROOM.floorY + 5, Math.min(ROOM.floorY + ROOM.floorH - 35, r.y));
            } else if (r.state === 'repairing') {
                r.repairTimer--;
                if (r.repairTimer <= 0) {
                    const target = r.repairTarget;
                    target.isBroken = false;
                    target.beingRepaired = false;
                    target.state = 'working';
                    target.task = 'Restored';
                    r.repairTarget = null;
                    r.state = 'idle';
                    addLog(r.id, `Maintenance complete for ${target.id}.`);
                }
            }
        }

        function drawPlant(p) {
            const px = p.x;
            const py = p.y;
            ctx.save();

            // Pot
            ctx.fillStyle = C.plantPot;
            if (p.type === 0 || p.type === 1) {
                ctx.fillRect(px, py + 15, 16, 12);
                ctx.fillStyle = darkenColor(C.plantPot, 0.7);
                ctx.fillRect(px - 2, py + 13, 20, 4);
            } else {
                ctx.fillRect(px - 4, py + 19, 24, 8);
                ctx.fillStyle = darkenColor(C.plantPot, 0.7);
                ctx.fillRect(px - 6, py + 17, 28, 4);
            }

            // Plant
            if (p.type === 0) { // Fern
                ctx.fillStyle = C.plant;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(px + 8, py + 15);
                    ctx.quadraticCurveTo(px - 15 + i * 10, py - 5, px + 8 + (i - 2) * 15, py - 15 + Math.abs(i - 2) * 5);
                    ctx.quadraticCurveTo(px + 8 + (i - 2) * 5, py + 5, px + 8, py + 15);
                    ctx.fill();
                }
            } else if (p.type === 1) { // Cactus
                ctx.fillStyle = C.plant;
                roundRect(px + 3, py - 15, 10, 30, 5);
                ctx.fill();
                roundRect(px - 2, py - 5, 6, 15, 3);
                ctx.fill();
                roundRect(px + 12, py, 6, 10, 3);
                ctx.fill();
                ctx.fillStyle = '#a7f3d0';
                for (let i = 0; i < 8; i++) {
                    ctx.fillRect(px + 4 + (i % 3) * 2, py - 10 + i * 4, 1, 1);
                }
            } else if (p.type === 2) { // Bonsai
                ctx.fillStyle = '#451a03';
                ctx.fillRect(px + 6, py + 5, 4, 15);
                ctx.beginPath(); ctx.moveTo(px + 6, py + 10); ctx.lineTo(px + 1, py + 5); ctx.lineWidth = 2; ctx.strokeStyle = '#451a03'; ctx.stroke();
                ctx.fillStyle = C.plant;
                ctx.beginPath(); ctx.arc(px + 8, py - 5, 14, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(px + 1, py + 3, 10, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(px + 15, py, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#10b981';
                ctx.beginPath(); ctx.arc(px + 6, py - 9, 6, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#080b14';
            ctx.fillRect(0, 0, W, H);

            drawFloor();
            drawWalls();

            updateParticles();
            drawParticles();
            updateAgents();
            updateRepairman();

            if (currentRoom === 0) {
                drawEnvironment();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 4]);
                for (let i = 0; i < agents.length; i++) {
                    for (let j = i + 1; j < agents.length; j++) {
                        if (agents[i].room === 0 && agents[j].room === 0 && agents[i].department === agents[j].department) {
                            ctx.beginPath();
                            ctx.moveTo(agents[i].deskX + 25, agents[i].deskY + 15);
                            ctx.lineTo(agents[j].deskX + 25, agents[j].deskY + 15);
                            ctx.stroke();
                        }
                    }
                }
                ctx.setLineDash([]);
                agents.forEach(a => drawDesk(a.deskX, a.deskY, a));
            } else if (currentRoom === 1) {
                drawBeds();
                drawControlPanel(ROOM.floorX + 30, ROOM.floorY - 45);
                ctx.fillStyle = '#10b981';
                ctx.font = '10px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('CORE SERVER & SLEEP ROOM', ROOM.floorX + ROOM.floorW / 2, ROOM.floorY + ROOM.floorH / 2);
            } else if (currentRoom === 2) {
                drawPulsar(ROOM.floorX + ROOM.floorW / 2, ROOM.floorY + ROOM.floorH / 2, 30);
                ctx.fillStyle = isExploded ? '#f87171' : '#22d3ee';
                ctx.font = '10px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText(isExploded ? 'PULSAR COLLAPSE' : 'CELLULAR PULSAR STABLE', ROOM.floorX + ROOM.floorW / 2, ROOM.floorY + ROOM.floorH / 2 + 60);
            }

            // Stability UI
            const barW = 150;
            const barX = W - barW - 20;
            const barY = 20;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(barX, barY, barW, 10);
            ctx.fillStyle = stability < 30 ? '#ef4444' : (stability < 70 ? '#fbbf24' : '#22d3ee');
            ctx.fillRect(barX, barY, (stability / 100) * barW, 10);
            ctx.strokeStyle = '#fff';
            ctx.strokeRect(barX, barY, barW, 10);
            ctx.fillStyle = '#fff';
            ctx.font = '6px "Press Start 2P"';
            ctx.textAlign = 'right';
            ctx.fillText(`STABILITY: ${Math.floor(stability)}%`, barX - 10, barY + 8);

            // Screen Flash
            if (flashTimer > 0) {
                ctx.fillStyle = `rgba(239, 68, 68, ${flashTimer / 60})`;
                ctx.fillRect(0, 0, W, H);
                flashTimer--;
            }

            // Draw sorting system
            const allItems = [...agents, repairman, ...officePlants].filter(item => {
                if (item.isPlant) return currentRoom === 0;
                return item.room === currentRoom;
            });

            allItems.sort((a, b) => a.y - b.y);
            allItems.forEach(item => {
                if (item.isPlant) drawPlant(item);
                else drawAgent(item);
            });

            requestAnimationFrame(draw);
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function lerp(a, b, t) { return a + (b - a) * t; }

        function darkenColor(hex, factor) {
            if (!hex || typeof hex !== 'string' || hex[0] !== '#') return '#000000';
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${Math.floor(r * factor)},${Math.floor(g * factor)},${Math.floor(b * factor)})`;
        }

        // RESTORED FUNCTIONS FOR PANEL INTERFACE

        function toggleManager(id, event) {
            if (event) event.stopPropagation();
            const targetAgent = agents.find(a => a.id === id);
            if (!targetAgent) return;

            agents.forEach(a => {
                if (a.department === targetAgent.department) a.isManager = false;
            });
            targetAgent.isManager = true;

            document.getElementById('agentList').innerHTML = '';
            updateAgentPanel();
            addLog('system_0', `👑 ${targetAgent.name} assigned as manager`);
        }

        function updateAgentPanel() {
            const list = document.getElementById('agentList');
            const allWorkers = [...agents, repairman];
            const statusLabels = { working: 'Working', thinking: 'Thinking', sleeping: 'Sleeping', walking: 'Walking', relaxed: 'Relaxing' };

            // 1. Update the list structure if count changed
            if (list.children.length !== allWorkers.length) {
                list.innerHTML = allWorkers.map(a => `
                    <div class="agent-mini" id="ui-${a.id}" onclick="focusAgent('${a.id}')" style="${a.isManager ? 'border-color:rgba(251,191,36,0.4); background:rgba(251,191,36,0.05)' : ''}">
                        <div class="agent-mini-avatar" style="background:${a.color}22;color:${a.color}">${a.id === 'repairman' ? '🔧' : (a.emoji || '🤖')}</div>
                        <div class="agent-mini-info">
                            <div class="agent-mini-name" style="color:${a.color}">${a.name} ${a.isManager ? '👑' : ''}</div>
                            <div class="agent-mini-status" id="task-${a.id}">${a.task}</div>
                        </div>
                        <span class="mini-badge ${a.state}" id="state-${a.id}">${statusLabels[a.state] || 'Waiting'}</span>
                        ${a.id !== 'repairman' ? `
                        <div class="agent-manager-btn ${a.isManager ? 'active' : ''}" title="Assign as Manager" onclick="toggleManager('${a.id}', event)">
                            ${a.isManager ? '⭐' : '☆'}
                        </div>
                        ` : ''}
                    </div>
                `).join('');
            }

            // 2. Update individual status badges and tasks
            allWorkers.forEach(a => {
                const badge = document.getElementById(`state-${a.id}`);
                if (badge && badge.innerText !== (statusLabels[a.state] || 'Waiting')) {
                    badge.className = `mini-badge ${a.state}`;
                    badge.innerText = statusLabels[a.state] || 'Waiting';
                }
                const task = document.getElementById(`task-${a.id}`);
                if (task && task.innerText !== a.task) {
                    task.innerText = a.task;
                }
            });

            // 3. Update top bar counters
            const totalAgents = allWorkers.length;
            const counter = document.getElementById('agentCount');
            if (counter) counter.textContent = totalAgents;
            const title = document.querySelector('.panel-title');
            if (title) title.textContent = `👥 agents (${totalAgents})`;
        }
        setInterval(updateAgentPanel, 1000);

        function goToRoom(n) {
            if (currentRoom === n) {
                currentRoom = 0;
            } else {
                currentRoom = n;
            }
            const roomNames = ['The Office', 'Server Core', 'Space Dome'];
            addLog('system_0', `Switching to ${roomNames[currentRoom]}`);

            const btn1 = document.getElementById('switchBtn1');
            const btn2 = document.getElementById('switchBtn2');

            btn1.textContent = currentRoom === 1 ? 'BACK TO OFFICE' : 'SERVER ROOM';
            btn1.style.background = currentRoom === 1 ? '#475569' : 'var(--purple)';

            btn2.textContent = currentRoom === 2 ? 'BACK TO OFFICE' : 'SPACE DOME';
            btn2.style.background = currentRoom === 2 ? '#475569' : 'var(--cyan)';
        }

        function switchRoom() { goToRoom(1); }

        function focusAgent(id) {
            const agent = agents.find(a => a.id === id);
            if (!agent) return;
            if (agent.state === 'walking') {
                agent.targetX = agent.deskX + 10;
                agent.targetY = agent.deskY + 50;
            }
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent =
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        }, 1000);

        function addLog(agentId, message) {
            if (!message) return;
            const list = document.getElementById('logList');
            const now = new Date();
            const time = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

            const baseRole = agentId.split('_')[0];
            const el = document.createElement('div');
            el.className = 'log-entry';
            el.innerHTML = `<span class="log-t">${time}</span><span class="log-a ${baseRole}">${agentId}</span><span class="log-m">${message}</span>`;
            list.appendChild(el);
            list.scrollTop = list.scrollHeight;

            while (list.children.length > 50) list.removeChild(list.firstChild);
        }

        const logMessages = {
