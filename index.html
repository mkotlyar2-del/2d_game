            analyst: ['📊 Processing data cluster', '🔍 Pattern found', '📈 Generating report', '🧮 Regression analysis'],
            planner: ['📋 Updating plan', '⚡ Allocating CPU resources', '🎯 Synchronizing', '📅 Cycle planning'],
            searcher: ['🌐 Parsing pages', '📚 Indexing', '🔗 Found 12 resources', '✅ Verification'],
        };

        setInterval(() => {
            const agent = agents[Math.floor(Math.random() * agents.length)];
            if (agent.state === 'working' || agent.state === 'thinking') {
                const baseId = agent.id.split('_')[0];
                const msgs = logMessages[baseId];
                if (Math.random() < 0.25) {
                    addLog(agent.id, msgs[Math.floor(Math.random() * msgs.length)]);
                }
            }
        }, 3500);

        const apiKey = "";

        async function processCommandWithAI(cmd) {
            const managers = rolesData.map((r, dept) => {
                const mgr = agents.find(a => a.department === dept && a.isManager);
                return mgr ? mgr.name : "not assigned";
            });

            const prompt = `You are an AI ecosystem with ${rolesData.length} departments: ${rolesData.map(r => r.name.toLowerCase()).join(', ')}.
Department managers: ${rolesData.map((r, i) => `${r.role} (${managers[i]})`).join(', ')}.
User gave the command: "${cmd}".
Execute it and return the result in JSON format according to this schema:
{
  ${rolesData.map(r => `"${r.idPrefix}": "Briefly (up to 5 words) what the manager/dept ${r.idPrefix} did"`).join(',\n  ')},
  "final_answer": "Final brief answer to the user about task completion (up to 10 words)"
}`;

            const maxRetries = 5;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        if (response.status >= 500 || response.status === 429) {
                            await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                            continue;
                        }
                        throw new Error(`API Error: ${response.status} ${JSON.stringify(errorData)}`);
                    }

                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (resultText) return JSON.parse(resultText);
                    throw new Error("Empty response from AI core");
                } catch (error) {
                    if (i === maxRetries - 1) {
                        console.error("AI Request Failed after retries:", error);
                        return {
                            planner: "Strategic sync failed",
                            searcher: "Data stream interrupted",
                            analyst: "Processing timeout reached",
                            final_answer: "System error: could not connect to AI core."
                        };
                    }
                    await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000));
                }
            }
        }

        async function sendCommand() {
            const input = document.getElementById('cmdInput');
            const cmd = input.value.trim();
            if (!cmd) return;

            const cmdLog = document.getElementById('cmdLog');
            cmdLog.innerHTML += `<div style="margin:3px 0"><span style="color:var(--purple)">❯</span> ${cmd}</div>`;
            cmdLog.scrollTop = cmdLog.scrollHeight;

            agents.forEach(a => {
                if (a.state === 'sleeping' || a.state === 'walking') {
                    a.state = 'walking';
                    a.targetX = a.deskX + 10;
                    a.targetY = a.deskY + 50;
                }
                a.state = 'working';
                a.task = cmd.substring(0, 30) + (cmd.length > 30 ? '...' : '');
            });

            for (let i = 0; i < agents.length; i++) {
                setTimeout(() => {
                    spawnParticle(agents[Math.floor(Math.random() * 5)], agents[5 + Math.floor(Math.random() * 10)], '#fff');
                }, i * 150);
            }

            addLog('system_0', `Consulting AI Core...`);
            input.value = 'AI Processing...';
            input.disabled = true;

            const aiResult = await processCommandWithAI(cmd);

            setTimeout(() => addLog('planner_2', aiResult.planner), 500);
            setTimeout(() => addLog('searcher_5', aiResult.searcher), 1500);
            setTimeout(() => addLog('analyst_1', aiResult.analyst), 2500);

            setTimeout(() => {
                const color = aiResult.final_answer.toLowerCase().includes("error") ? 'var(--red)' : 'var(--green)';
                cmdLog.innerHTML += `<div style="margin:3px 0; color: ${color}"><span style="color:${color}">●</span> Core: ${aiResult.final_answer}</div>`;
                cmdLog.scrollTop = cmdLog.scrollHeight;
                input.value = '';
                input.disabled = false;
                input.focus();

                agents.forEach(a => {
                    a.state = Math.random() > 0.5 ? 'thinking' : 'walking';
                    a.task = 'Cycle complete';
                });
            }, 3500);

            const tc = document.getElementById('taskCount');
            tc.textContent = parseInt(tc.textContent) + 1;
        }

        document.getElementById('cmdInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendCommand();
        });

        const tooltip = document.getElementById('tooltip');
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            let found = null;
            agents.forEach(a => {
                if (mx > a.x - 5 && mx < a.x + 25 && my > a.y - 15 && my < a.y + 35) {
                    found = a;
                }
            });

            // Check Control Panel Hover in Room 1
            let onPanel = false;
            if (currentRoom === 1) {
                const px = ROOM.floorX + 30;
                const py = ROOM.floorY - 45;
                if (mx > px && mx < px + 60 && my > py && my < py + 40) {
                    onPanel = true;
                }
            }

            if (found || onPanel) {
                if (found) {
                    const statusLabels = { working: '🟢 Working', thinking: '🟡 Thinking', sleeping: '⚪ Sleeping', walking: '🔵 Walking', relaxed: '🟣 Relaxing' };
                    const deptNames = rolesData.map(r => r.role);
                    tooltip.innerHTML = `
                        <div class="tt-name" style="color:${found.color}">${found.emoji} ${found.name} ${found.isManager ? '👑' : ''}</div>
                        <div class="tt-task" style="color:#94a3b8">[ Dept: ${deptNames[found.department]} ]</div>
                        <div class="tt-task">${found.role} • ${statusLabels[found.state]}</div>
                        <div class="tt-task" style="margin-top:4px">📌 ${found.task}</div>
                    `;
                    tooltip.style.left = (e.clientX + 16) + 'px';
                    tooltip.style.top = (e.clientY - 60) + 'px';
                    tooltip.classList.add('visible');
                }
                canvas.style.cursor = 'pointer';
            } else {
                tooltip.classList.remove('visible');
                canvas.style.cursor = 'default';
            }
        });

        canvas.addEventListener('click', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            if (currentRoom === 1) {
                const px = ROOM.floorX + 30;
                const py = ROOM.floorY - 45;
                if (mx > px && mx < px + 60 && my > py && my < py + 40) {
                    openUI();
                }
            }
        });

        function openUI() {
            const ui = document.getElementById('controlPanelUI');
            const perc = Math.floor(stability);
            document.getElementById('uiStability').textContent = perc + '%';
            document.getElementById('uiStabilityBar').style.width = perc + '%';
            document.getElementById('reactorStatus').textContent = isExploded ? 'CRITICAL' : (stability < 30 ? 'UNSTABLE' : 'ACTIVE');
            document.getElementById('reactorStatus').style.color = isExploded ? 'var(--red)' : (stability < 30 ? 'var(--yellow)' : 'var(--green)');
            ui.style.display = 'block';
            addLog('system_0', 'Accessing System Core Interface...');
        }

        function closeUI() {
            document.getElementById('controlPanelUI').style.display = 'none';
        }

        addLog('system_0', '🚀 Initializing Neural Network...');
        setTimeout(() => addLog('system_0', `✅ ${agents.length + 1} agents synchronized`), 800);
        updateAgentPanel();
        draw();
    </script>
</body>

</html>
